name: Release

# A SemVer tag (v1.2.3) builds the multi-arch image and pushes it to GHCR.
# The tag value is injected as the build version (pkg/version via ldflags).

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # create the GitHub Release
  packages: write # push the image to GHCR

jobs:
  release-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          # No floating "latest": deployments pin a version (SPEC §3.3,
          # CODING-STANDARDS §7).
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      # Publish a GitHub Release from the CHANGELOG section for this tag, so a
      # SemVer tag produces both the GHCR image (above) and a human-readable
      # release entry — no manual step (F-013 follow-up).
      - name: Extract changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v h="## [$version]" 'index($0,h)==1{p=1;next} p&&/^## \[/{exit} p{print}' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::no CHANGELOG.md section found for $version"
            exit 1
          fi
      - uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          make_latest: "true"
