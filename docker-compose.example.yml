# Example deployment: mcp-oauth-gateway fronting an MCP server.
# Copy to docker-compose.yml, copy .env.example to .env and fill it in
# (or run ./setup.sh), then replace every <placeholder> here.
# No real values in these files (GR-5).
#
# TLS: this example assumes a TLS-terminating reverse proxy in front of the
# gateway (mode A in .env.example). For built-in ACME instead (mode B),
# publish "80:8080" + "443:8443" and set TLS_HOST / TLS_ACCEPT_TOS in .env.
#
# Pitfall: Compose interpolates env_file values — every `$` in the bcrypt
# PASSWORD_HASH must be escaped as `$$` (see .env.example).

services:
  mcp-oauth-gateway:
    image: ghcr.io/xnyzer/mcp-oauth-gateway:<version> # pin a version, never latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080" # reverse proxy forwards to this (image default LISTEN=:8080)
    env_file:
      - .env
    command:
      - "http://mcp-upstream:3000/mcp" # the MCP server to front
    volumes:
      - gateway-data:/data # keys, token store — back this up (SPEC.md §2.2)
    # The image ships its own HEALTHCHECK (the binary probes /healthz).
    depends_on:
      mcp-upstream:
        condition: service_healthy

  # Example upstream MCP server — replace with your actual server.
  mcp-upstream:
    image: <your-mcp-server-image>
    restart: unless-stopped
    # No published ports: only reachable by the gateway on the compose network.
    healthcheck:
      # Replace with a probe your upstream supports (or, if it has none,
      # change the depends_on condition above to service_started).
      test: ["CMD", "<health-probe-command>"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gateway-data:
